<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démarrage - ThaborSolution</title>
  <style>
    :root {
      --bg-color: #030712;
      --card-bg: rgba(17, 24, 39, 0.7);
      --text-color: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #2563eb;
      --primary-glow: rgba(37, 99, 235, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      perspective: 1000px;
    }

    /* Background Grid & Glows */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 4rem 4rem;
      background-position: center;
      z-index: 1;
    }

    .glow-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      filter: blur(40px);
      z-index: 2;
      border-radius: 50%;
      animation: pulse-glow 4s infinite ease-in-out;
    }

    /* Container Card */
    .container {
      position: relative;
      z-index: 10;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px border rgba(255, 255, 255, 0.08);
      border-radius: 2rem;
      padding: 3rem;
      width: 440px;
      text-align: center;
      box-shadow: 
        0 10px 25px -5px rgba(0, 0, 0, 0.3),
        0 8px 10px -6px rgba(0, 0, 0, 0.3),
        0 0 40px 0 rgba(37, 99, 235, 0.05);
      transform: translateZ(20px);
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Logo & Icon */
    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4.5rem;
      height: 4.5rem;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border-radius: 1.25rem;
      margin-bottom: 2rem;
      box-shadow: 
        0 0 25px 0 rgba(37, 99, 235, 0.4),
        inset 0 2px 4px rgba(255, 255, 255, 0.2);
      animation: logo-bounce 2s infinite ease-in-out;
    }

    .logo-icon {
      width: 2.25rem;
      height: 2.25rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Typography */
    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
      background: linear-gradient(to bottom, #ffffff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.status {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    /* Loader Animation */
    .loader-ring {
      display: inline-block;
      position: relative;
      width: 4rem;
      height: 4rem;
      margin-bottom: 1.5rem;
    }

    .loader-ring div {
      box-sizing: border-box;
      display: block;
      position: absolute;
      width: 3.25rem;
      height: 3.25rem;
      margin: 0.375rem;
      border: 3.5px solid var(--primary);
      border-radius: 50%;
      animation: loader-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      border-color: var(--primary) transparent transparent transparent;
    }

    .loader-ring div:nth-child(1) { animation-delay: -0.45s; }
    .loader-ring div:nth-child(2) { animation-delay: -0.3s; }
    .loader-ring div:nth-child(3) { animation-delay: -0.15s; }

    /* Footer Info */
    .footer-info {
      font-size: 0.75rem;
      color: rgba(156, 163, 175, 0.4);
      margin-top: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Animations */
    @keyframes loader-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes logo-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-circle"></div>

  <div class="container">
    <div class="logo-container">
      <!-- Lucide Packages icon SVG -->
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
        <line x1="12" y1="22.08" x2="12" y2="12"></line>
      </svg>
    </div>

    <h1>ThaborSolution</h1>
    
    <div class="loader-ring">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>

    <p class="status" id="status-text">Initialisation du serveur local...</p>

    <div class="footer-info">ThaborSolution Stock Manager</div>
  </div>

  <script>
    const statusText = document.getElementById("status-text");
    const targetUrl = "http://localhost:3000";
    
    const messages = [
      "Démarrage du serveur de base de données...",
      "Vérification des structures locales...",
      "Compilation de l'application...",
      "Lancement de ThaborSolution...",
      "Connexion au port 3000..."
    ];
    let msgIndex = 0;

    // Cycle text messages every 1.5 seconds to show activity
    const messageInterval = setInterval(() => {
      statusText.textContent = messages[msgIndex];
      msgIndex = (msgIndex + 1) % messages.length;
    }, 1500);

    // Poll the dev server port until it becomes active
    async function checkServer() {
      try {
        // mode: "no-cors" is key to allow cross-origin requests from file:///
        await fetch(targetUrl, { mode: "no-cors" });
        
        // Server is online! Redirect
        clearInterval(messageInterval);
        statusText.style.color = "#10b981";
        statusText.textContent = "Connecté ! Redirection...";
        
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 300);
      } catch (e) {
        // Server is offline yet. Wait 400ms and check again
        setTimeout(checkServer, 400);
      }
    }

    // Start checking after a short delay
    setTimeout(checkServer, 500);
  </script>
</body>
</html>
